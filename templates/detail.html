<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ game.name }} | SteamHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --bg: #0b0e14; --surface: #161b22; --border: #30363d; }
        
        /* Genel Reset */
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; margin: 0; line-height: 1.6; overflow-x: hidden; }
        
        /* Hero Bölümü - Hata Veren Inline Style'dan Kurtulduk */
        .hero-section { 
            width: 100%; 
            height: 45vh; 
            background-color: #000;
            background-position: center;
            background-size: cover;
            position: relative; 
        }
        
        .hero-overlay { 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(to top, #0b0e14, transparent); 
        }

        .main-container { max-width: 900px; margin: -60px auto 100px; padding: 0 20px; position: relative; }
        
        /* İçerik Kutuları */
        .info-card { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            padding: 30px; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            overflow: hidden; /* Dışarı taşan CSS'i engeller */
        }

        .section-title { 
            color: var(--primary); 
            font-size: 22px; 
            margin-top: 0; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 15px; 
            margin-bottom: 20px;
            font-weight: 800;
        }

        /* Derecelendirme Tasarımı */
        .rating-box { display: flex; gap: 60px; align-items: center; }
        .score-big { font-size: 40px; font-weight: 800; color: #ffd700; }
        
        /* Yorum Kartları */
        .user-review { 
            border-left: 3px solid var(--primary); 
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 0 12px 12px 0;
            margin-bottom: 15px;
        }

        /* Satın Al Butonu */
        .steam-button { 
            display: block; 
            background: var(--primary); 
            color: #000; 
            text-align: center; 
            padding: 22px; 
            border-radius: 15px; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 18px; 
            margin-top: 40px;
            transition: 0.3s ease;
        }
        .steam-button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,210,255,0.2); }

                /* Steam'den gelen bozuk HTML'i dizginlemek için */
                .steam-raw-content { font-size: 15px; color: #abb2bf; overflow-wrap: break-word; }
            </style>
        </head>
